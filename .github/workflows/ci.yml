name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/ tests/

  test-native:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Test CLI dry-run
        run: marimo-precompute examples/lj_dimer_precompute.py --dry-run

  test-e2e:
    runs-on: ubuntu-latest
    needs: test-native
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with E2E dependencies
        run: pip install -e ".[e2e]"

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run E2E tests
        run: pytest tests/test_e2e_wasm.py -v --timeout=300
