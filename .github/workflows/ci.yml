name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-native:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Test CLI dry-run
        run: marimo-precompute examples/lj_dimer_precompute.py --dry-run

  test-wasm:
    runs-on: ubuntu-latest
    needs: test-native
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Precompute example (writes to public/)
        run: |
          pip install -e ".[dev]"
          marimo-precompute examples/lj_dimer_precompute.py

      - name: Install Node test dependencies
        run: npm ci

      - name: Test in Pyodide via Node.js
        run: node tests/test_wasm_pyodide.mjs
