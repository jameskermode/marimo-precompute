# Template GitHub Actions workflow for marimo-precompute
# Precomputes results, exports notebooks as WASM, deploys to GitHub Pages.
#
# Cache files are written to public/__marimo_precompute__/ following
# marimo's convention (https://docs.marimo.io/guides/wasm/#including-data)
# and bundled automatically by `marimo export html-wasm`.
#
# Customize:
#   - NOTEBOOKS: list of notebook .py files to export
#   - EXTRA_DEPS: additional pip packages needed for precomputation

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install marimo
          pip install git+https://github.com/jameskermode/marimo-precompute.git
          # pip install <your-extra-deps-here>

      - name: Dry run (check feasibility)
        run: |
          for nb in notebooks/*.py; do
            echo "=== $nb ==="
            marimo-precompute "$nb" --dry-run || true
          done

      - name: Precompute results
        run: |
          for nb in notebooks/*.py; do
            echo "=== Precomputing $nb ==="
            marimo-precompute "$nb" --max-combinations 50000
          done

      - name: Export notebooks to WASM HTML
        run: |
          mkdir -p _site
          for nb in notebooks/*.py; do
            name=$(basename "$nb" .py)
            echo "=== Exporting $name ==="
            marimo export html-wasm "$nb" \
              --mode run \
              --no-show-code \
              -o "_site/${name}.html"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
